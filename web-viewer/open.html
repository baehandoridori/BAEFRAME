<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAEFRAME - 파일 열기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .logo {
      font-size: 3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #4a9eff, #ff4a9e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .status-detail {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s, opacity 0.2s;
      text-align: center;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4a9eff, #4aff9e);
      color: #000;
      font-weight: bold;
    }

    .btn-secondary {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
    }

    .hidden {
      display: none !important;
    }

    .platform-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: rgba(74, 158, 255, 0.2);
      border: 1px solid rgba(74, 158, 255, 0.5);
      border-radius: 20px;
      font-size: 0.8rem;
      color: #4a9eff;
      margin-bottom: 1rem;
    }

    .error-message {
      background: rgba(255, 74, 74, 0.2);
      border: 1px solid rgba(255, 74, 74, 0.5);
      padding: 1rem;
      border-radius: 8px;
      color: #ff6b6b;
      margin-bottom: 1.5rem;
    }

    /* 숨겨진 iframe (앱 열기 시도용) */
    #appLauncher {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">BAEFRAME</div>
    <div class="subtitle">영상 리뷰 협업 도구</div>

    <div id="platformBadge" class="platform-badge"></div>

    <div id="loadingState">
      <div class="loader"></div>
      <div class="status" id="statusText">파일 정보 확인 중...</div>
      <div class="status-detail" id="statusDetail"></div>
    </div>

    <div id="errorState" class="hidden">
      <div class="error-message" id="errorMessage"></div>
    </div>

    <div id="buttons" class="buttons hidden">
      <a href="#" id="btnOpenWeb" class="btn btn-primary">
        🌐 웹 뷰어로 열기
      </a>
      <a href="#" id="btnOpenApp" class="btn btn-secondary">
        🖥️ 데스크톱 앱으로 열기
      </a>
    </div>
  </div>

  <!-- 앱 열기 시도용 숨겨진 iframe -->
  <iframe id="appLauncher" name="appLauncher"></iframe>

  <script>
    // URL 파라미터 파싱
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('video');
    const bframeUrl = params.get('bframe');

    // 플랫폼 감지
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const isMobile = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(userAgent);
    const isAndroid = /Android/i.test(userAgent);
    const isMac = /Mac/i.test(userAgent) && !isMobile;
    const isWindows = /Win/i.test(userAgent);

    // UI 요소
    const platformBadge = document.getElementById('platformBadge');
    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const errorMessage = document.getElementById('errorMessage');
    const buttons = document.getElementById('buttons');
    const btnOpenApp = document.getElementById('btnOpenApp');
    const btnOpenWeb = document.getElementById('btnOpenWeb');
    const statusText = document.getElementById('statusText');
    const statusDetail = document.getElementById('statusDetail');
    const appLauncher = document.getElementById('appLauncher');

    // 웹 뷰어 URL 생성
    function getWebViewerUrl() {
      const baseUrl = window.location.href.replace(/\/open\.html.*$/, '');
      return `${baseUrl}/index.html?video=${encodeURIComponent(videoUrl)}&bframe=${encodeURIComponent(bframeUrl)}`;
    }

    // 앱 프로토콜 URL 생성
    function getAppUrl() {
      return `baeframe://open?video=${encodeURIComponent(videoUrl)}&bframe=${encodeURIComponent(bframeUrl)}`;
    }

    // 플랫폼 표시
    function showPlatform() {
      if (isMobile) {
        platformBadge.textContent = isIOS ? '📱 iOS' : '📱 Android';
      } else if (isMac) {
        platformBadge.textContent = '🍎 macOS';
      } else if (isWindows) {
        platformBadge.textContent = '🪟 Windows';
      } else {
        platformBadge.textContent = '💻 Desktop';
      }
    }

    // URL 유효성 검사
    function validateUrls() {
      if (!videoUrl || !bframeUrl) {
        showError('파일 URL이 누락되었습니다. 올바른 공유 링크인지 확인해주세요.');
        return false;
      }
      return true;
    }

    // 에러 표시
    function showError(message) {
      loadingState.classList.add('hidden');
      errorState.classList.remove('hidden');
      errorMessage.textContent = message;
      showButtons();
    }

    // 버튼 표시
    function showButtons() {
      buttons.classList.remove('hidden');
      btnOpenWeb.href = getWebViewerUrl();
      btnOpenApp.href = getAppUrl();

      // 모바일에서는 앱 버튼 숨기기
      if (isMobile) {
        btnOpenApp.classList.add('hidden');
      }
    }

    // 웹 뷰어로 리다이렉트
    function redirectToWebViewer() {
      console.log('🌐 웹 뷰어로 이동');
      window.location.replace(getWebViewerUrl());
    }

    // 데스크톱에서 앱 열기 시도 (iframe 방식)
    function tryOpenAppWithFallback() {
      statusText.textContent = '데스크톱 앱 확인 중...';
      statusDetail.textContent = '잠시만 기다려주세요';

      const appUrl = getAppUrl();
      let appOpened = false;

      // visibility change로 앱 열림 감지
      const handleVisibilityChange = () => {
        if (document.hidden) {
          appOpened = true;
          console.log('✅ 앱이 열린 것 같습니다');
        }
      };
      document.addEventListener('visibilitychange', handleVisibilityChange);

      // blur 이벤트로도 감지 (일부 브라우저)
      const handleBlur = () => {
        appOpened = true;
        console.log('✅ 창이 포커스를 잃음 - 앱 열림');
      };
      window.addEventListener('blur', handleBlur);

      // iframe으로 앱 열기 시도 (대화상자 없이)
      try {
        appLauncher.src = appUrl;
      } catch (e) {
        console.log('iframe 방식 실패, link 방식 시도');
      }

      // 숨겨진 링크로도 시도
      const link = document.createElement('a');
      link.href = appUrl;
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // 1.5초 후 앱이 안 열렸으면 웹으로 폴백
      setTimeout(() => {
        document.removeEventListener('visibilitychange', handleVisibilityChange);
        window.removeEventListener('blur', handleBlur);

        if (!appOpened && !document.hidden) {
          console.log('⚠️ 앱이 열리지 않음, 웹 뷰어로 이동');
          statusText.textContent = '웹 뷰어로 이동합니다...';
          statusDetail.textContent = '';

          setTimeout(redirectToWebViewer, 500);
        }
      }, 1500);
    }

    // Slack 웹훅 딥링크 처리: #open=baeframe://... 형식
    function handleSlackDeepLink() {
      const hash = window.location.hash;
      if (!hash || !hash.startsWith('#open=')) return false;

      // hash에서 가져온 인코딩된 원본 유지 (브라우저 호환성)
      const rawEncoded = hash.substring(6); // baeframe%3A%2F%2F...
      const baeframeUrl = decodeURIComponent(rawEncoded);
      if (!baeframeUrl.startsWith('baeframe://')) return false;

      // 재시도 버튼용으로 원본 URL 저장
      slackDeepLinkUrl = baeframeUrl;

      // 디코딩된 URL에서 파일명 추출 (표시용)
      const displayName = baeframeUrl.replace('baeframe://', '').split('?')[0].split(/[/\\]/).pop();

      // href용: 경로 부분을 인코딩된 상태로 유지
      // baeframe:// 프로토콜 + 인코딩된 경로
      const pathPart = baeframeUrl.substring('baeframe://'.length);
      const encodedHref = 'baeframe://' + encodeURI(pathPart).replace(/%5C/gi, '\\');

      // 브라우저가 HTTPS→커스텀 프로토콜 이동을 차단하므로 복사 방식 사용
      statusText.textContent = '아래 버튼으로 링크를 복사하세요';
      statusDetail.textContent = displayName;

      buttons.classList.remove('hidden');
      btnOpenApp.href = '#';
      btnOpenApp.textContent = '📋 링크 복사';
      btnOpenApp.onclick = (e) => {
        e.preventDefault();
        navigator.clipboard.writeText(baeframeUrl).then(() => {
          btnOpenApp.textContent = '✅ 복사됨! 주소창에 붙여넣기 (Ctrl+L → Ctrl+V → Enter)';
          btnOpenApp.classList.add('copied');
          setTimeout(() => {
            btnOpenApp.textContent = '📋 다시 복사';
            btnOpenApp.classList.remove('copied');
          }, 5000);
        });
      };
      btnOpenWeb.classList.add('hidden');

      return true;
    }

    // 메인 로직
    function main() {
      showPlatform();

      // Slack 딥링크 처리 (#open=baeframe://...)
      if (handleSlackDeepLink()) return;

      if (!validateUrls()) {
        return;
      }

      if (isMobile) {
        // 모바일: 바로 웹 뷰어로 이동
        statusText.textContent = '모바일 환경 감지';
        statusDetail.textContent = '웹 뷰어로 이동합니다...';

        // 즉시 리다이렉트 (setTimeout 없이)
        redirectToWebViewer();
      } else {
        // 데스크톱: 앱 열기 시도 후 웹 폴백
        tryOpenAppWithFallback();
      }
    }

    // Slack 딥링크 원본 URL 저장
    let slackDeepLinkUrl = null;

    // 버튼 클릭 이벤트
    btnOpenApp.addEventListener('click', (e) => {
      if (slackDeepLinkUrl) {
        // Slack 딥링크: href에 baeframe:// 설정되어 있으므로 기본 동작 허용
        // e.preventDefault() 호출하지 않음 → 브라우저가 프로토콜 핸들러 실행
        return;
      }
      e.preventDefault();
      window.location.href = getAppUrl();
    });

    btnOpenWeb.addEventListener('click', (e) => {
      e.preventDefault();
      redirectToWebViewer();
    });

    // 페이지 로드 시 시작
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', main);
    } else {
      main();
    }
  </script>
</body>
</html>
